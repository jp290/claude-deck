<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Claude Deck</title>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#141414">
<link rel="stylesheet" href="/xterm.css">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; overflow: hidden; background: #141414; overscroll-behavior: none; }
  body { font-family: ui-monospace, Menlo, Consolas, monospace; -webkit-text-size-adjust: 100%; touch-action: manipulation; }
  #app { position: fixed; top: 0; left: 0; width: 100%; height: 100vh; display: flex; flex-direction: column; }
  #termwrap { position: relative; flex: 1; min-height: 0; padding: 4px 0 0 6px;
    overflow: hidden; user-select: none; -webkit-user-select: none; }
  #term { height: 100%; }
  .xterm .xterm-viewport { -webkit-overflow-scrolling: touch; }
  #jump { position: absolute; display: none; bottom: 12px; right: 14px; z-index: 5;
    width: 44px; height: 44px; border-radius: 50%; border: 1px solid #444;
    background: #222d; color: #ddd; font-size: 18px; align-items: center; justify-content: center; }
  #bar { position: relative; z-index: 2; flex-shrink: 0; background: #1c1c1c; border-top: 1px solid #2a2a2a;
    padding: 8px 8px calc(8px + env(safe-area-inset-bottom)); display: flex; flex-direction: column; gap: 8px; }
  .row { display: flex; gap: 7px; align-items: center; }
  .row button { flex: 1; height: 42px; border-radius: 10px; border: 1px solid #333;
    background: #262626; color: #ccc; font-size: 14px; font-family: inherit;
    touch-action: manipulation; user-select: none; -webkit-user-select: none; }
  .row button:active { background: #3a3a3a; }
  #dot { flex: none; width: 9px; height: 9px; border-radius: 50%; margin: 0 3px; }
  #dot.on { background: #3fb950; } #dot.off { background: #f85149; }
  button.chip { color: #7aa2f7; border-color: #2c3a5e; font-size: 13px; }
  button.chip.active { background: #7aa2f7; color: #10131c; border-color: #7aa2f7; }
  #inputrow { display: flex; gap: 7px; align-items: flex-end; }
  #input { flex: 1; min-height: 42px; max-height: 110px; resize: none; padding: 11px 12px;
    border-radius: 12px; border: 1px solid #333; background: #262626; color: #eee;
    font-size: 16px; font-family: inherit; line-height: 1.3; }
  #send { flex: none; width: 62px; height: 42px; border-radius: 12px; border: none;
    background: #7aa2f7; color: #10131c; font-size: 17px; font-weight: 700; font-family: inherit;
    touch-action: manipulation; user-select: none; -webkit-user-select: none; }
  #send:disabled { opacity: 0.5; }
  #send:active { filter: brightness(1.2); }
  #mic { flex: none; width: 46px; height: 42px; border-radius: 12px; border: 1px solid #333;
    background: #262626; font-size: 18px; touch-action: manipulation; user-select: none; }
  #mic:active { background: #3a3a3a; }
  #live.on { background: #e0af68; color: #10131c; border-color: #e0af68; }
  #livein { flex: 1; height: 42px; padding: 0 12px; border-radius: 12px;
    border: 1px solid #e0af68; background: #262626; color: #e0af68;
    font-size: 16px; font-family: inherit; }
</style>
</head>
<body>
<div id="app">
  <div id="termwrap">
    <div id="term"></div>
    <button id="jump">▼</button>
  </div>
  <div id="bar">
    <div id="keys" class="row">
      <button data-key="Escape">esc</button>
      <button data-key="BTab">⇧⇥</button>
      <button data-key="Up">↑</button>
      <button data-key="Down">↓</button>
      <button data-key="Enter">⏎</button>
      <button data-key="C-c">^C</button>
      <button id="live">⌨</button>
      <span id="dot" class="off"></span>
    </div>
    <div id="chips" class="row">
      <button class="chip" data-cmd="/sharpen">sharpen</button>
      <button class="chip" data-cmd="/gosharp">gosharp</button>
      <button class="chip" data-cmd="/sharpen3">sharpen3</button>
      <button class="chip" data-cmd="/gosharp3">gosharp3</button>
    </div>
    <div id="livebar" class="row" style="display:none">
      <input id="livein" type="text" placeholder="Live → tippt direkt ins Terminal"
        autocomplete="off" autocapitalize="none" spellcheck="false">
    </div>
    <div id="inputrow">
      <button id="mic">🎤</button>
      <textarea id="input" rows="1" placeholder="Prompt…"
        autocomplete="off" autocapitalize="sentences"></textarea>
      <button id="send">➤</button>
    </div>
  </div>
</div>
<script src="/app.js"></script>
</body>
</html>
